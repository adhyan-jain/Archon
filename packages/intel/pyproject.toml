[project]
name = "archon-intel"
version = "0.1.0"
description = "Engineering intelligence analytics for Archon"
requires-python = ">=3.12"
dependencies = [
    "archon-core",
    "archon-graph",
    "archon-conventions",
]

[tool.uv.sources]
archon-core = { workspace = true }
archon-graph = { workspace = true }
archon-conventions = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/archon_intel"]
