[project]
name = "archon-core"
version = "0.1.0"
description = "Shared types and interfaces for Archon"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.backends"

[tool.hatch.build.targets.wheel]
packages = ["src/archon_core"]