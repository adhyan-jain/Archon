[project]
name = "archon-infra"
version = "0.1.0"
description = "Infrastructure adapters for Archon"
requires-python = ">=3.12"
dependencies = [
    "archon-core",
]

[tool.uv.sources]
archon-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/archon_infra"]
