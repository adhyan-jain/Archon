[project]
name = "archon-conventions"
version = "0.1.0"
description = "Convention detection and enforcement for Archon"
requires-python = ">=3.12"
dependencies = [
    "archon-core",
    "archon-graph",
]

[tool.uv.sources]
archon-core = { workspace = true }
archon-graph = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/archon_conventions"]
